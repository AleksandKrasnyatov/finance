name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality gate
    runs-on: ubuntu-latest

    env:
      REDIS_URL: redis://127.0.0.1:6379
      MESSENGER_TRANSPORT_DSN: redis://127.0.0.1:6379/messages

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: app
          POSTGRES_PASSWORD: '!ChangeMe!'
          POSTGRES_DB: app
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U app -d app"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # PHP 8.5 matches composer.json (>=8.5). setup-php supports 8.5 on ubuntu-latest.
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: mbstring, xml, ctype, iconv, intl, zip, pdo_pgsql, redis
          coverage: none
          tools: composer:v2

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: |
            ${{ steps.composer-cache.outputs.dir }}
            vendor
          key: composer-${{ runner.os }}-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            composer-${{ runner.os }}-

      - name: Prepare environment
        run: |
          cp .env.example .env
          mkdir -p config/jwt
          openssl genpkey -out config/jwt/private.pem -algorithm rsa -pkeyopt rsa_keygen_bits:4096
          openssl pkey -in config/jwt/private.pem -out config/jwt/public.pem -pubout
          chmod 600 config/jwt/private.pem

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Warm up Symfony cache for PHPStan
        run: php bin/console cache:warmup --env=dev
        env:
          APP_ENV: dev
          APP_DEBUG: '1'

      - name: PHP CS Fixer (dry-run)
        run: vendor/bin/php-cs-fixer fix --dry-run --diff

      - name: PHPStan
        run: vendor/bin/phpstan analyse --memory-limit=1G

      - name: Prepare test database
        run: |
          php bin/console doctrine:database:create --env=test --if-not-exists
          php bin/console doctrine:migrations:migrate --env=test --no-interaction --allow-no-migration
        env:
          APP_ENV: test

      - name: PHPUnit
        run: php bin/phpunit
        env:
          APP_ENV: test
